<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Controle de Paradas</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef2f7;
      margin: 0;
      padding: 0;
      color: #1f2937;
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 4px 18px rgba(0,0,0,.07);
    }

    h1, h2, h3, h4 {
      margin-top: 0;
    }

    input, select, textarea, button {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      margin-bottom: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      box-sizing: border-box;
      font-size: 14px;
    }

    button {
      background: #2563eb;
      color: #fff;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover { opacity: .95; }
    .btn-secondary { background: #6b7280; }
    .btn-danger { background: #dc2626; }
    .btn-success { background: #16a34a; }
    .grid-1 { grid-template-columns: 1fr; }
    .grid-2, .grid-3, .grid-4, .menu { display: grid; gap: 12px; }
    .grid-2 { grid-template-columns: 1fr 1fr; }
    .grid-3 { grid-template-columns: 1fr 1fr 1fr; }
    .grid-4 { grid-template-columns: repeat(4, 1fr); }
    .menu { grid-template-columns: repeat(5, 1fr); }

    .hidden { display: none; }
    .item {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 12px;
      background: #f9fafb;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
    }

    .aberta { background: #fef3c7; color: #92400e; }
    .finalizada { background: #dcfce7; color: #166534; }

    .erro { color: #dc2626; font-weight: bold; }
    .ok { color: #16a34a; font-weight: bold; }
    .small { font-size: 12px; color: #6b7280; }

    .section-title {
      margin: 22px 0 10px;
      padding-bottom: 8px;
      border-bottom: 1px solid #e5e7eb;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
    }

    th, td {
      border: 1px solid #e5e7eb;
      padding: 10px;
      text-align: left;
      font-size: 14px;
      vertical-align: top;
    }

    th { background: #f3f4f6; }

    label.inline-check {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      font-size: 14px;
    }

    label.inline-check input {
      width: auto;
      margin: 0;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    @media (max-width: 900px) {
      .grid-2, .grid-3, .grid-4, .menu, .tabs {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="loginTela" class="card">
      <h1>Controle de Paradas</h1>
      <input type="email" id="email" placeholder="E-mail" />
      <input type="password" id="senha" placeholder="Senha" />
      <button onclick="login()">Entrar</button>
      <div id="loginMsg"></div>
    </div>

    <div id="appTela" class="hidden">

          <button onclick="mostrarTela('novaParadaTela')">Nova parada</button>
          <button onclick="mostrarTela('abertasTela'); carregarAbertas()">Em aberto</button>
          <button onclick="mostrarTela('historicoTela'); carregarHistorico()">Histórico</button>
          <button onclick="mostrarTela('dashboardTela'); carregarDashboard()">Dashboard</button>
          <button id="btnAdmin" class="hidden" onclick="mostrarTela('adminTela'); carregarUsuariosAdmin()">Admin</button>
        </div>

        <button class="btn-secondary" onclick="logout()">Sair</button>

<div id="novaParadaTela" class="card">

  <div id="filaOfflineInfo" class="small"></div>

</div>
<div id="abertasTela" class="card hidden">

  <div id="listaAbertas"></div>
</div>

        <div id="tabelaMaquinas"></div>

          <button onclick="mostrarAdminAba('abaCriarUsuario')">Criar usuário</button>

          <button onclick="mostrarAdminAba('abaCadastros')">Setores e máquinas</button>

          <button onclick="criarMaquina()">Criar máquina</button>

        </div>
      </div>
    </div>
  </div>

    async function login() {

    async function criarUsuario() {
      const nome = document.getElementById('novoNome').value.trim();
      const email = document.getElementById('novoEmail').value.trim();
      const password = document.getElementById('novoPassword').value.trim();
      const setor = document.getElementById('novoSetor').value.trim();

      }

      try {
        const { data: sessao, error: erroSessao } = await client.auth.getSession();

        if (erroSessao || !sessao?.session?.access_token) {
          msg.innerHTML = `<div class="erro">Sessão inválida. Saia e entre novamente.</div>`;
          return;
        }

        const accessToken = sessao.session.access_token;

        const resp = await fetch('https://mzawmvqrlrptidcwxkoi.supabase.co/functions/v1/criar-usuarios', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${accessToken}`,
            'apikey': SUPABASE_KEY
          },
          body: JSON.stringify({
            nome,
            email,
            password,
            setor,
            cargo,
            admin,
            multi_setor
          })
        });

        const texto = await resp.text();
        let json = {};

        try { json = JSON.parse(texto); } catch (_) {}

        if (!resp.ok) {
          msg.innerHTML = `<div class="erro">Status ${resp.status}: ${json.error || texto || 'Erro ao criar usuário.'}</div>`;
          return;

        msg.innerHTML = `<div class="ok">${json.message || 'Usuário criado com sucesso.'}</div>`;

          </div>

          <div class="grid-3">
            <input id="setor_${u.id}" value="${u.setor || ''}" placeholder="Setor" />
            <input id="senha_${u.id}" type="password" placeholder="Nova senha" />
            <input value="${u.id}" readonly />
          </div>

          <label class="inline-check">
            <input type="checkbox" id="ativo_${u.id}" ${u.ativo ? 'checked' : ''}> Ativo
          </label>

          <label class="inline-check">
            <input type="checkbox" id="admin_${u.id}" ${u.admin ? 'checked' : ''}> Admin

          <label class="inline-check">
            <input type="checkbox" id="multi_${u.id}" ${u.multi_setor ? 'checked' : ''}> Multi setor

async function abrirParada() {
  const select = document.getElementById('maquinaSelect');
  const option = select.options[select.selectedIndex];

  const maquinaId = select.value;
  const maquinaNome = option?.dataset?.nome || '';
  const setorSelecionado = document.getElementById('setorSelect').value || option?.dataset?.setor || perfil.setor;
  const dataParada = document.getElementById('dataParada').value;
  const motivo = document.getElementById('motivo').value.trim();
  const horaInicio = document.getElementById('horaInicio').value;
  const msg = document.getElementById('novaParadaMsg');

  msg.innerHTML = '';

  if (!maquinaId || !dataParada || !motivo || !horaInicio || !setorSelecionado) {
    msg.innerHTML = `<div class="erro">Preencha todos os campos.</div>`;
    return;
  }

  const payload = {
    maquina_id: maquinaId,
    maquina_nome: maquinaNome,
    setor: setorSelecionado,
    data_parada: dataParada,
    motivo: motivo,
    hora_inicio: horaInicio,
    usuario_id: usuario.id,
    usuario_nome: perfil.nome,
    status: 'ABERTA'
  };

  if (!estaOnline()) {
    adicionarFilaOffline(payload);

    msg.innerHTML = `<div class="ok">Sem internet. Parada salva no app e será sincronizada depois.</div>`;
    notificarNovaParada(
      'Nova parada registrada',
      `${maquinaNome} - ${setorSelecionado} (salva offline)`
    );

    limparFormularioNovaParada();
    await carregarAbertas();
    await carregarHistorico();
    await carregarDashboard();
    return;
  }

  const { error } = await client
    .from('paradas')
    .insert([payload]);

  if (error) {
    adicionarFilaOffline(payload);
    msg.innerHTML = `<div class="erro">Falha online. A parada foi guardada no app para sincronizar depois.</div>`;
    return;
  }

  msg.innerHTML = `<div class="ok">Parada aberta com sucesso.</div>`;

  notificarNovaParada(
    'Nova parada registrada',
    `${maquinaNome} - ${setorSelecionado}`
  );

  limparFormularioNovaParada();

  await carregarAbertas();
  await carregarHistorico();
  await carregarDashboard();
}
async function carregarAbertas() {
  const div = document.getElementById('listaAbertas');

  if (!estaOnline()) {
    const fila = lerFilaOffline();

    if (!fila.length) {
      div.innerHTML = '<p>Nenhuma parada em aberto offline.</p>';
      return;
    }

    div.innerHTML = '';

    fila.forEach(item => {
      div.innerHTML += `
        <div class="item">
          <b>Máquina:</b> ${item.maquina_nome}<br>
          <b>Setor:</b> ${item.setor}<br>
          <b>Data parada:</b> ${item.data_parada}<br>
          <b>Hora início:</b> ${item.hora_inicio}<br>
          <b>Motivo:</b> ${item.motivo}<br>
          <span class="badge aberta">OFFLINE</span><br><br>

<input type="time" id="fim_${item.offline_id}" />

<textarea id="obs_${item.offline_id}" rows="3" placeholder="Observação"></textarea>

<button onclick="finalizarOffline('${item.offline_id}', '${item.hora_inicio}')">
Finalizar parada
</button>
        </div>
      `;
    });

    return;
  }

  let query = client
    .from('paradas')
    .select('*')
    .eq('status', 'ABERTA')
    .order('data_lancamento', { ascending: false });

  if (!perfil.admin && !perfil.multi_setor) {
    query = query.eq('setor', perfil.setor);
  }

  const { data, error } = await query;

}function finalizarOffline(id, horaInicio) {
  const horaFim = document.getElementById(`fim_${id}`).value;
  const obs = document.getElementById(`obs_${id}`).value.trim();

  if (!horaFim) {
    alert('Informe a hora final.');
    return;
  }

  let fila = lerFilaOffline();

  const item = fila.find(x => x.offline_id === id);

  if (!item) return;

  const finalizada = {
    ...item,
    hora_fim: horaFim,
    observacao: obs,
    status: 'FINALIZADA',
    duracao_min: calcularDuracaoMin(horaInicio, horaFim)
  };

  fila = fila.filter(x => x.offline_id !== id);

  salvarFilaOffline(fila);

  let hist = JSON.parse(localStorage.getItem(STORAGE_FINALIZADAS_OFFLINE) || '[]');
  hist.push(finalizada);

  localStorage.setItem(STORAGE_FINALIZADAS_OFFLINE, JSON.stringify(hist));

  carregarAbertas();

  alert('Parada finalizada offline.');
}
    async function finalizarParada(id, horaInicio) {
      const horaFim = document.getElementById(`fim_${id}`).value;
      const observacao = document.getElementById(`obs_${id}`).value.trim();

      if (!horaFim) {
        alert('Informe a hora final.');
        return;
      }

      const duracao = calcularDuracaoMin(horaInicio, horaFim);

      const { error } = await client
        .from('paradas')
        .update({
          hora_fim: horaFim,
          observacao: observacao,
          status: 'FINALIZADA',
          duracao_min: duracao
        })
        .eq('id', id);

      if (error) {
        alert(error.message);
        return;
      }

      alert('Parada finalizada com sucesso.');

      await carregarAbertas();
      await carregarHistorico();
      await carregarDashboard();
    }

    async function carregarDashboard() {
      const inicio = document.getElementById('filtroInicioDash').value;
      const fim = document.getElementById('filtroFimDash').value;

      let query = client
        .from('paradas')
        .select('*')
        .gte('data_parada', inicio)
        .lte('data_parada', fim);

      if (!perfil.admin && !perfil.multi_setor) {
        query = query.eq('setor', perfil.setor);
      }

      const { data, error } = await query;

      if (error) {
        document.getElementById('resumoBoxes').innerHTML = `<div class="erro">${error.message}</div>`;
        return;
      }

      const totalParadas = data.length;
      const abertas = data.filter(x => x.status === 'ABERTA').length;
      const finalizadas = data.filter(x => x.status === 'FINALIZADA').length;
      const totalMin = data.reduce((s, x) => s + Number(x.duracao_min || 0), 0);

      document.getElementById('resumoBoxes').innerHTML = `
        <div class="item"><b>Total de paradas</b><br><h2>${totalParadas}</h2></div>
        <div class="item"><b>Em aberto</b><br><h2>${abertas}</h2></div>
        <div class="item"><b>Finalizadas</b><br><h2>${finalizadas}</h2></div>
        <div class="item"><b>Horas acumuladas</b><br><h2>${minutosParaHora(totalMin)}</h2></div>
      `;

      const resumoMaquinas = {};

      data.forEach(item => {
        if (!resumoMaquinas[item.maquina_nome]) {
          resumoMaquinas[item.maquina_nome] = { qtd: 0, min: 0 };
        }

        resumoMaquinas[item.maquina_nome].qtd += 1;
        resumoMaquinas[item.maquina_nome].min += Number(item.duracao_min || 0);
      });

      const linhas = Object.entries(resumoMaquinas)
        .sort((a, b) => b[1].min - a[1].min)
        .map(([maquina, v]) => `
          <tr>
            <td>${maquina}</td>
            <td>${v.qtd}</td>
            <td>${minutosParaHora(v.min)}</td>
          </tr>
        `).join('');

      document.getElementById('tabelaMaquinas').innerHTML = `
        <table>
          <thead>
            <tr>
              <th>Máquina</th>
              <th>Qtd. paradas</th>
              <th>Tempo acumulado</th>
            </tr>
          </thead>
          <tbody>
            ${linhas || '<tr><td colspan="3">Sem dados</td></tr>'}
          </tbody>
        </table>
      `;
    }

    function hojeISO() {
      const hoje = new Date();
      return hoje.toISOString().slice(0, 10);
    }

    function primeiroDiaMes() {
      const d = new Date();
      d.setDate(1);
      return d.toISOString().slice(0, 10);
    }

    function calcularDuracaoMin(horaInicio, horaFim) {
      const [hi, mi] = horaInicio.split(':').map(Number);
      const [hf, mf] = horaFim.split(':').map(Number);

      let inicio = hi * 60 + mi;
      let fim = hf * 60 + mf;
      let total = fim - inicio;

      if (total < 0) total += 1440;

      return total;
    }

    function minutosParaHora(min) {
      const total = Number(min || 0);
      const horas = Math.floor(total / 60);
      const minutos = total % 60;

      return String(horas).padStart(2, '0') + ':' + String(minutos).padStart(2, '0');
    }

function estaOnline() {

function atualizarStatusConexao() {
  const el = document.getElementById('statusConexao');
  if (!el) return;

  if (estaOnline()) {
    el.innerHTML = '<span class="ok">🟢 Online</span>';
  } else {
    el.innerHTML = '<span class="erro">🔴 Offline</span>';
  }

  atualizarInfoFilaOffline();
}

function lerFilaOffline() {
  try {
    return JSON.parse(localStorage.getItem(STORAGE_FILA_PARADAS) || '[]');
  } catch {
    return [];
  }
}

function salvarFilaOffline(lista) {
  localStorage.setItem(STORAGE_FILA_PARADAS, JSON.stringify(lista));
  atualizarInfoFilaOffline();
}

function adicionarFilaOffline(item) {
  const fila = lerFilaOffline();
  fila.push({
    ...item,
    offline_id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
    criado_em_local: new Date().toISOString()
  });
  salvarFilaOffline(fila);
}

function atualizarInfoFilaOffline() {
  const el = document.getElementById('filaOfflineInfo');
  if (!el) return;

  const fila = lerFilaOffline();
  if (!fila.length) {
    el.innerHTML = 'Sem pendências offline.';
    return;
  }

  el.innerHTML = `${fila.length} parada(s) pendente(s) para sincronizar.`;
}

async function sincronizarFilaOffline() {
  if (!estaOnline()) return;

  // ---------- ABERTAS ----------
  let fila = lerFilaOffline();
  let restantes = [];

  for (const item of fila) {
    try {
      const { error } = await client
        .from('paradas')
        .insert([{
          maquina_id: item.maquina_id,
          maquina_nome: item.maquina_nome,
          setor: item.setor,
          data_parada: item.data_parada,
          motivo: item.motivo,
          hora_inicio: item.hora_inicio,
          usuario_id: item.usuario_id,
          usuario_nome: item.usuario_nome,
          status: 'ABERTA'
        }]);

      if (error) restantes.push(item);

    } catch {
      restantes.push(item);
    }
  }

  salvarFilaOffline(restantes);

  // ---------- FINALIZADAS ----------
  let finalizadas = JSON.parse(
    localStorage.getItem(STORAGE_FINALIZADAS_OFFLINE) || '[]'
  );

  let restantesFinalizadas = [];

  for (const item of finalizadas) {
    try {
      const { error } = await client
        .from('paradas')
        .insert([{
          maquina_id: item.maquina_id,
          maquina_nome: item.maquina_nome,
          setor: item.setor,
          data_parada: item.data_parada,
          motivo: item.motivo,
          hora_inicio: item.hora_inicio,
          hora_fim: item.hora_fim,
          observacao: item.observacao,
          usuario_id: item.usuario_id,
          usuario_nome: item.usuario_nome,
          status: 'FINALIZADA',
          duracao_min: item.duracao_min
        }]);

      if (error) restantesFinalizadas.push(item);

    } catch {
      restantesFinalizadas.push(item);
    }
  }

  localStorage.setItem(
    STORAGE_FINALIZADAS_OFFLINE,
    JSON.stringify(restantesFinalizadas)
  );

  await carregarAbertas();
  await carregarHistorico();
  await carregarDashboard();
}
